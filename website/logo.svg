<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for icon -->
  <circle cx="30" cy="30" r="25" fill="url(#iconGradient)" opacity="0.1"/>
  
  <!-- Main icon - Calculator/Finance symbol -->
  <g transform="translate(15, 15)">
    <!-- Calculator body -->
    <rect x="0" y="0" width="30" height="40" rx="4" fill="url(#iconGradient)"/>
    
    <!-- Calculator screen -->
    <rect x="3" y="3" width="24" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
    
    <!-- Calculator buttons -->
    <circle cx="8" cy="18" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="15" cy="18" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="22" cy="18" r="2" fill="#ffffff" opacity="0.8"/>
    
    <circle cx="8" cy="25" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="15" cy="25" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="22" cy="25" r="2" fill="#ffffff" opacity="0.8"/>
    
    <circle cx="8" cy="32" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="15" cy="32" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="22" cy="32" r="2" fill="#ffffff" opacity="0.8"/>
    
    <!-- Dollar sign overlay -->
    <text x="15" y="7" font-family="Arial, sans-serif" font-size="6" font-weight="bold" text-anchor="middle" fill="#2563eb">$</text>
  </g>
  
  <!-- Company name -->
  <text x="70" y="25" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="url(#logoGradient)">Elite Tax</text>
  <text x="70" y="45" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#64748b">&amp; Finance</text>
</svg>

